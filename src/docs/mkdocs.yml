site_name: RacerAPI Engineering Handbook
site_description: FastAPI modular monolith architecture and development contract
site_url: https://example.com/racerapi-docs
repo_name: racerapi
repo_url: https://github.com/your-org/racerapi

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Modular Monolith: architecture/modular-monolith.md
      - Request Flow: architecture/request-flow.md
      - Dependency Injection: architecture/dependency-injection.md
      - Module Boundaries: architecture/module-boundaries.md
  - Modules:
      - Module Structure: modules/structure.md
      - Users Module: modules/users.md
      - Add New Module: modules/adding-new-module.md
  - Backend Layers:
      - API Layer: backend/api-layer.md
      - Service Layer: backend/service-layer.md
      - Repo Layer: backend/repo-layer.md
      - Schemas: backend/schemas.md
  - Core:
      - Configuration: core/config.md
      - Database: core/database.md
      - Dependencies: core/dependencies.md
      - Error Handling: core/error-handling.md
  - Development:
      - Setup: development/setup.md
      - Running: development/running.md
      - Testing: development/testing.md
      - Debugging: development/debugging.md
  - Standards:
      - Coding Rules: standards/coding-rules.md
      - Anti-Patterns: standards/anti-patterns.md
      - Review Checklist: standards/review-checklist.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - def_list
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_css:
  - stylesheets/extra.css
